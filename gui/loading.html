<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        :root {
            --color-accent: #3b82f6;
            --color-text-primary: #0f172a;
            --color-text-secondary: #475569;
            --color-bg-btn: #f1f5f9;
            --color-bg-btn-hover: #e2e8f0;
            --color-bg-btn-active: #cbd5e1;
            --color-border-btn: #e2e8f0;
            --color-error: #ef4444;
            --color-loader-bg: #e2e8f0;
            --color-loader-accent: #3b82f6;
            --radius-sm: 4px;
            --space-sm: 8px;
            --space-md: 20px;
            --font-size-btn: 14px;
        }

        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid var(--color-loader-bg);
            border-top: 5px solid var(--color-loader-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .error {
            color: var(--color-error);
            text-align: center;
            padding: var(--space-md);
        }
        .reload{
            color: var(--color-text-primary);
            font-size: 18px;
            text-align: center;
            padding: var(--space-md);
        }
        .reload-btn {
            padding: 6px 12px;
            background-color: var(--color-bg-btn);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border-btn);
            border-radius: var(--radius-sm);
            font-family: PingFang SC, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Ubuntu, Helvetica Neue, Helvetica, Arial, Hiragino Sans GB, Microsoft YaHei UI, Microsoft YaHei, Source Han Sans CN, sans-serif;
            font-size: var(--font-size-btn);
            cursor: pointer;
        }
        .reload-btn:hover {
            background-color: var(--color-bg-btn-hover);
        }

        .reload-btn:active {
            background-color: var(--color-bg-btn-active);
        }

        @media (prefers-color-scheme: dark) {
            body{
                background: #1a1a1a;
            }
        }
    </style>
    <script>
        window.onload = function () {
            const reload = document.querySelector('#reloadUrl');
            reload.addEventListener('click', function () {
                window.myApi.refreshSelf();
            });
        }
    </script>
</head>
<body>
    <div class="loader"></div>
    <div class="error" style="display: none;"></div>
    <div class="reload" style="display: none;">
        <button id="reloadUrl" class="reload-btn">重新加载</button>
    </div>
</body>
</html>
