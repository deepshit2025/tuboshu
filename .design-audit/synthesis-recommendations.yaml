# Generated by AI — shadcn 冷色调 redesign
# 作为 design-restyle 的输入契约

reference: shadcn
tone: cool

target_tokens:
  colors:
    primary:
      value: "#3b82f6"
      replaces: ["#2080f0", "#409eff", "#1a6fd0"]
      note: "shadcn blue-500，比原 #2080f0 更纯净的蓝"
    primary-hover:
      value: "#2563eb"
      replaces: ["#409eff"]
    primary-pressed:
      value: "#1d4ed8"
      replaces: ["#1a6fd0"]
    accent-cyan:
      value: "#06b6d4"
      replaces: ["#10A37F", "#25b39e", "#25B39E", "#22c55e"]
      note: "cyan-500 冷色系，取代暖绿色"
    accent-cyan-hover:
      value: "#0891b2"
    
    text-primary:
      value: "#0f172a"
      replaces: ["#2c3e50", "#181818", "#000000", "#333", "var(--vt-c-indigo)"]
      note: "slate-900 冷灰文字"
    text-secondary:
      value: "#475569"
      replaces: ["#666"]
      note: "slate-600 冷灰次要文字"
    text-tertiary:
      value: "#94a3b8"
      replaces: ["#999", "#aaa", "#888"]
      note: "slate-400 冷灰提示文字"
    text-inverse:
      value: "#f8fafc"
      note: "深色背景上的文字"

    bg-page:
      value: "#f8fafc"
      replaces: ["var(--color-background)", "#ffffff", "#fefefe"]
      note: "slate-50 冷灰页面背景"
    bg-card:
      value: "#ffffff"
      note: "纯白卡片"
    bg-surface:
      value: "#f1f5f9"
      replaces: ["var(--color-background-soft)", "#f8f8f8", "#f1f1f1"]
      note: "slate-100 表面背景"
    bg-muted:
      value: "#e2e8f0"
      replaces: ["var(--color-background-mute)", "#f2f2f2"]
      note: "slate-200 哑光背景"
    bg-hover:
      value: "#e2e8f0"
      replaces: ["#d1d1d1", "#eee"]

    border-default:
      value: "#e2e8f0"
      replaces: ["var(--new-color-border)", "#e7e7e7", "#ccc", "#e8e8e8"]
      note: "slate-200 边框"
    border-hover:
      value: "#cbd5e1"
      replaces: ["var(--color-border-hover)", "rgba(60, 60, 60, 0.29)"]
      note: "slate-300 hover边框"
    border-light:
      value: "#f1f5f9"
      note: "slate-100 浅边框"

    semantic-success:
      value: "#10b981"
      replaces: ["#22c55e"]
      note: "emerald-500 成功绿"
    semantic-warning:
      value: "#f59e0b"
      note: "amber-500 警告"
    semantic-error:
      value: "#ef4444"
      replaces: ["#d32f2f", "#e88080"]
      note: "red-500 错误/删除"
    semantic-info:
      value: "#3b82f6"
      note: "blue-500 信息"

    dark:
      bg-page: "#0f172a"
      bg-surface: "#1e293b"
      bg-card: "#1e293b"
      text-primary: "#f8fafc"
      text-secondary: "#94a3b8"
      text-tertiary: "#64748b"
      border-default: "#334155"
      border-hover: "#475569"
      sidebar-bg: "#0f172a"
      highlight-bg: "#1e293b"

  spacing:
    grid: 4
    xs: "4px"
    sm: "8px"
    md: "16px"
    lg: "24px"
    xl: "32px"
    note: "保持原 4px 网格"

  typography:
    font-family:
      value: "Inter, PingFang SC, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      note: "shadcn 风格: Inter 作为英文字体优先，保留中文字体"
    font-size-base:
      value: "16px"
    font-size-sm:
      value: "13px"
      note: "shadcn 使用 0.875rem(14px) 作为 sm，我们略调整为 13px"
    font-size-xs:
      value: "12px"
    font-size-lg:
      value: "18px"
    font-size-h3:
      value: "20px"

  border-radius:
    none: "0"
    sm: "4px"
    md: "6px"
    lg: "12px"
    full: "50%"
    note: "shadcn 默认 radius 0.5rem(8px) 为 md，调整为 6px 更精细"

  shadows:
    sm:
      value: "0 1px 2px 0 rgba(0, 0, 0, 0.05)"
      note: "shadcn 微阴影"
    md:
      value: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)"
      note: "shadcn 卡片阴影"
    lg:
      value: "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1)"
      note: "shadcn 浮动阴影"
    sidebar:
      value: "1px 0 3px rgba(0, 0, 0, 0.08)"
      note: "侧栏阴影"
